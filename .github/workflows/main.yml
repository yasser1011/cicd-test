name: Build & Deploy Spring app

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    name: Build and deploy spring boot
    runs-on: ubuntu-latest
    steps:
      - name: Say Hello
        run: echo "Hello from GitHub Actions!"

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: maven # to avoid installing it again everytime we modify the pipeline

      - name: Build with Maven
        run: mvn clean package
        env:
          VALUE1: ${{ secrets.TESTVALUE1 }}
          VALUE2: ${{ secrets.TESTVALUE2 }}

      - name: List files
        run: ls ./target

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ls ~/.ssh
          ssh-keyscan -H ${{ secrets.AWS_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Copy Jar file to AWS server
        run: |
          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.AWS_SERVER_USER }}@${{ secrets.AWS_SERVER_IP }} "mkdir -p ~/footballersmarketspringbackend/test"
          scp -i ~/.ssh/id_rsa ./target/demo-cicd-app.jar \
            ${{ secrets.AWS_SERVER_USER }}@${{ secrets.AWS_SERVER_IP }}:~/footballersmarketspringbackend/test/demo-cicd-app.jar
          scp -i ~/.ssh/id_rsa Dockerfile \
            ${{ secrets.AWS_SERVER_USER }}@${{ secrets.AWS_SERVER_IP }}:~/footballersmarketspringbackend/test/Dockerfile
#          ssh -i ~/.ssh/id_rsa \
#            ${{ secrets.AWS_SERVER_USER }}@${{ secrets.AWS_SERVER_IP }} "ls -lh ~/footballersmarketspringbackend/test"
      - name: Run test script on AWS server
        run: |
          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.AWS_SERVER_USER }}@${{ secrets.AWS_SERVER_IP }} << 'EOF'
            cd ~/footballersmarketspringbackend/test
            echo "value1=${{ secrets.TESTVALUE1 }}" > .env
            echo "value2=${{ secrets.TESTVALUE2 }}" >> .env
            docker build -t my-spring-app .

            docker stop my-spring-app || true
            docker rm my-spring-app || true

            docker run -d --name my-spring-app -p 5000:5000 --env-file .env my-spring-app
            docker image prune -f
            rm .env
            docker ps | grep my-spring-app
          EOF
#      - name: Cleanup SSH key
#        if: always()
#        run: rm -f ~/.ssh/id_rsa